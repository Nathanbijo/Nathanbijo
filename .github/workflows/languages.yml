name: Language chart

on:
  schedule:
    - cron: "0 3 * * 1"      # Mondays, 03:00 UTC
  workflow_dispatch:          # manual trigger button
  push:
    branches: [main]
    paths: ["scripts/languages.py", ".github/workflows/languages.yml"]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render chart
        env:
          # GITHUB_TOKEN only sees public repos. To include private ones,
          # create a PAT with `repo` scope and store it as secret GH_PAT,
          # then swap the line below for: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: Nathanbijo
          EXCLUDE: "HTML,CSS,Jupyter Notebook"
          EXCLUDE_REPOS: ""
          TOP_N: "6"
        run: python scripts/languages.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/languages.svg
          git diff --staged --quiet || git commit -m "chore: refresh language chart"
          git push
